<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article — Yogentix</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2d5016;
            --primary-light: #4a7c23;
            --accent: #c8a951;
            --bg: #faf9f6;
            --text: #2c2c2c;
            --text-light: #6b6b6b;
            --border: #e8e4dc;
            --shadow: 0 2px 20px rgba(0,0,0,0.06);
            --radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }

        /* Navbar */
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }

        .logo span { color: var(--accent); }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--primary);
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 2px solid var(--primary);
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* Article Layout */
        .article-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .article-hero-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: var(--radius);
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .article-category {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }

        .category-yoga { background: #eef5e6; color: #3d6b1e; }
        .category-herbs { background: #fef3e2; color: #8a6914; }
        .category-wellness { background: #e8f0fe; color: #1a56b8; }

        .article-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .article-meta {
            display: flex;
            gap: 1.5rem;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .article-content {
            font-size: 1.1rem;
            line-height: 1.9;
            color: #3a3a3a;
        }

        .article-content p {
            margin-bottom: 1.5rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            text-align: center;
            padding: 4rem 2rem;
        }

        .error-msg h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 1rem;
        }

        .error-msg a {
            color: var(--primary);
        }

        /* Footer */
        .footer {
            background: var(--primary);
            color: white;
            padding: 3rem 2rem;
            margin-top: 4rem;
        }

        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .footer-logo span { color: var(--accent); }
        .footer-text { opacity: 0.8; font-size: 0.9rem; }

        @media (max-width: 768px) {
            .article-title { font-size: 1.8rem; }
            .article-hero-img { height: 250px; }
            .article-content { font-size: 1rem; }
            .footer-inner { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="logo">Yogen<span>tix</span></a>
            <a href="/" class="back-btn">← Back to Articles</a>
        </div>
    </nav>

    <main class="article-container" id="article-container">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>Loading article...</p>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-logo">Yogen<span>tix</span></div>
            <div class="footer-text">&copy; 2025 Yogentix. All rights reserved.</div>
        </div>
    </footer>

    <script>
        function formatDate(dateString) {
            var options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }

        function getEmoji(category) {
            var emojis = { yoga: '🧘', herbs: '🌿', wellness: '✨' };
            return emojis[category] || '📄';
        }

        function loadArticle() {
            var container = document.getElementById('article-container');
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');

            if (!id) {
                container.innerHTML = '<div class="error-msg"><h2>No article selected</h2><p><a href="/">← Go back to all articles</a></p></div>';
                return;
            }

            fetch('/api/articles/' + id)
                .then(function(response) {
                    if (!response.ok) throw new Error('Article not found');
                    return response.json();
                })
                .then(function(article) {
                    document.title = article.title + ' — Yogentix';

                    var imageUrl = article.image || 'https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=900&q=80';

                    // Convert newlines in content to paragraphs
                    var paragraphs = article.content.split('\n').filter(function(p) {
                        return p.trim() !== '';
                    });
                    var contentHtml = paragraphs.map(function(p) {
                        return '<p>' + p.trim() + '</p>';
                    }).join('');

                    var html = '';
                    html += '<img class="article-hero-img" src="' + imageUrl + '" alt="' + article.title + '" onerror="this.src=\'https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=900&q=80\'">';
                    html += '<span class="article-category category-' + article.category + '">' + getEmoji(article.category) + ' ' + article.category + '</span>';
                    html += '<h1 class="article-title">' + article.title + '</h1>';
                    html += '<div class="article-meta">';
                    html += '  <span>✍️ ' + (article.author || 'Yogentix Team') + '</span>';
                    html += '  <span>📅 ' + formatDate(article.createdAt) + '</span>';
                    html += '</div>';
                    html += '<div class="article-content">' + contentHtml + '</div>';

                    container.innerHTML = html;
                })
                .catch(function(error) {
                    console.error('Error:', error);
                    container.innerHTML = '<div class="error-msg"><h2>Article not found</h2><p>This article may have been removed.</p><p><a href="/">← Go back to all articles</a></p></div>';
                });
        }

        loadArticle();
    </script>
</body>
</html>
