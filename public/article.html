<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article — Yogentix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <a href="/" class="logo">
                <div class="logo-mark">Y</div>
                <span class="logo-text">Yogentix</span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/#articles" class="nav-link">All Articles</a></li>
                <li><a href="/#articles" class="nav-link">Yoga</a></li>
                <li><a href="/#articles" class="nav-link">Herbs</a></li>
                <li><a href="/#articles" class="nav-link">Wellness</a></li>
            </ul>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- ARTICLE CONTENT -->
    <main class="article-page">
        <div class="container">

            <div class="article-header" id="articleHeader">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading article...</p>
                </div>
            </div>

            <div class="article-hero-image" id="articleImage" style="display:none;">
                <img id="articleImg" src="" alt="">
            </div>

            <article class="article-body" id="articleBody">
            </article>

        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border:none; padding: 28px 0;">
                <p>&copy; 2024 Yogentix. Crafted with 🌿 for a balanced world.</p>
            </div>
        </div>
    </footer>

    <script>
        // Get article ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        async function loadArticle() {
            if (!articleId) {
                document.getElementById('articleHeader').innerHTML = '<h2>Article not found</h2><p><a href="/" style="color: #3d7a4a;">← Back to Home</a></p>';
                return;
            }

            try {
                const response = await fetch('/api/articles/' + articleId);
                const article = await response.json();

                if (!article || article.message) {
                    document.getElementById('articleHeader').innerHTML = '<h2>Article not found</h2><p><a href="/" style="color: #3d7a4a;">← Back to Home</a></p>';
                    return;
                }

                // Update page title
                document.title = article.title + ' — Yogentix';

                // Format date
                const date = new Date(article.createdAt);
                const formattedDate = date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                // Build header
                document.getElementById('articleHeader').innerHTML = ''
                    + '<a href="/" class="article-back">← Back to Articles</a>'
                    + '<div class="article-category-badge">' + article.category + '</div>'
                    + '<h1 class="article-page-title">' + article.title + '</h1>'
                    + '<div class="article-meta">'
                    + '  <span>📅 ' + formattedDate + '</span>'
                    + '  <span>✍️ ' + (article.author || 'Yogentix Team') + '</span>'
                    + '</div>';

                // Show image
                if (article.image) {
                    document.getElementById('articleImg').src = article.image;
                    document.getElementById('articleImg').alt = article.title;
                    document.getElementById('articleImage').style.display = 'block';
                }

                // Show content - convert line breaks to paragraphs
                var content = article.content;
                var paragraphs = content.split('\n\n');
                var htmlContent = '';
                paragraphs.forEach(function(p) {
                    if (p.trim()) {
                        htmlContent += '<p>' + p.trim() + '</p>';
                    }
                });
                document.getElementById('articleBody').innerHTML = htmlContent;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('articleHeader').innerHTML = '<h2>Error loading article</h2><p><a href="/" style="color: #3d7a4a;">← Back to Home</a></p>';
            }
        }

        // Mobile menu
        document.getElementById('mobileMenuBtn').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('open');
        });

        loadArticle();
    </script>
</body>
</html>
