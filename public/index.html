<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yogentix — Yoga, Herbs & Natural Wellness</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2d5016;
            --primary-light: #4a7c23;
            --accent: #c8a951;
            --bg: #faf9f6;
            --bg-card: #ffffff;
            --text: #2c2c2c;
            --text-light: #6b6b6b;
            --border: #e8e4dc;
            --shadow: 0 2px 20px rgba(0,0,0,0.06);
            --shadow-hover: 0 8px 40px rgba(0,0,0,0.12);
            --radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }

        .logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            border-radius: 2px;
        }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text);
        }

        /* ===== HERO ===== */
        .hero {
            background: linear-gradient(135deg, #2d5016 0%, #4a7c23 50%, #6b9b37 100%);
            color: white;
            padding: 5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            margin-bottom: 1rem;
            position: relative;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            font-weight: 300;
        }

        .hero-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            position: relative;
        }

        /* ===== CATEGORIES FILTER ===== */
        .filter-section {
            max-width: 1200px;
            margin: -1.5rem auto 0;
            padding: 0 2rem;
            position: relative;
            z-index: 10;
        }

        .filter-bar {
            background: white;
            border-radius: var(--radius);
            padding: 1rem 1.5rem;
            display: flex;
            gap: 0.75rem;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.6rem 1.5rem;
            border: 2px solid var(--border);
            background: white;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-light);
            transition: all 0.3s;
        }

        .filter-btn:hover {
            border-color: var(--primary-light);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ===== ARTICLES GRID ===== */
        .articles-section {
            max-width: 1200px;
            margin: 2.5rem auto;
            padding: 0 2rem;
        }

        .articles-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .article-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .article-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .article-card-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .article-card-body {
            padding: 1.5rem;
        }

        .article-card-category {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }

        .category-yoga {
            background: #eef5e6;
            color: #3d6b1e;
        }

        .category-herbs {
            background: #fef3e2;
            color: #8a6914;
        }

        .category-wellness {
            background: #e8f0fe;
            color: #1a56b8;
        }

        .article-card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            line-height: 1.3;
            color: var(--text);
        }

        .article-card-summary {
            font-size: 0.9rem;
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-light);
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .read-more {
            color: var(--primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-articles {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }

        .no-articles h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        /* ===== FOOTER ===== */
        .footer {
            background: var(--primary);
            color: white;
            padding: 3rem 2rem;
            margin-top: 4rem;
        }

        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .footer-logo span {
            color: var(--accent);
        }

        .footer-text {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .articles-grid {
                grid-template-columns: 1fr;
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 70px;
                left: 0;
                right: 0;
                background: white;
                flex-direction: column;
                padding: 1rem 2rem;
                border-bottom: 1px solid var(--border);
                box-shadow: var(--shadow);
            }

            .nav-links.open {
                display: flex;
            }

            .mobile-toggle {
                display: block;
            }

            .footer-inner {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="logo">Yogen<span>tix</span></a>
            <button class="mobile-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
            <ul class="nav-links">
                <li><a href="/" class="active">Home</a></li>
                <li><a href="#articles" onclick="filterArticles('yoga')">Yoga</a></li>
                <li><a href="#articles" onclick="filterArticles('herbs')">Herbs</a></li>
                <li><a href="#articles" onclick="filterArticles('wellness')">Wellness</a></li>
            </ul>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <span class="hero-icon">🧘</span>
        <h1>Nourish Your Body, Calm Your Mind</h1>
        <p>Explore the ancient wisdom of yoga, healing herbs, and natural wellness — backed by modern science, rooted in tradition.</p>
    </section>

    <!-- CATEGORY FILTERS -->
    <div class="filter-section">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterArticles('all')">All Articles</button>
            <button class="filter-btn" onclick="filterArticles('yoga')">🧘 Yoga</button>
            <button class="filter-btn" onclick="filterArticles('herbs')">🌿 Herbs</button>
            <button class="filter-btn" onclick="filterArticles('wellness')">✨ Wellness</button>
        </div>
    </div>

    <!-- ARTICLES -->
    <section class="articles-section" id="articles">
        <div id="articles-container">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading articles...</p>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-logo">Yogen<span>tix</span></div>
            <div class="footer-text">&copy; 2025 Yogentix. All rights reserved.</div>
        </div>
    </footer>

    <script>
        var currentCategory = 'all';

        // Format date nicely
        function formatDate(dateString) {
            var options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }

        // Get category CSS class
        function getCategoryClass(category) {
            return 'category-' + category;
        }

        // Get category emoji
        function getCategoryEmoji(category) {
            var emojis = { yoga: '🧘', herbs: '🌿', wellness: '✨' };
            return emojis[category] || '📄';
        }

        // Load articles from API
        function loadArticles(category) {
            var container = document.getElementById('articles-container');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Loading articles...</p></div>';

            var url = '/api/articles';
            if (category && category !== 'all') {
                url += '?category=' + category;
            }

            fetch(url)
                .then(function(response) {
                    return response.json();
                })
                .then(function(articles) {
                    if (articles.length === 0) {
                        container.innerHTML = '<div class="no-articles"><h3>No articles found</h3><p>Check back soon for new content!</p></div>';
                        return;
                    }

                    var html = '<div class="articles-grid">';

                    articles.forEach(function(article) {
                        var imageUrl = article.image || 'https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=900&q=80';

                        html += '<a class="article-card" href="/article.html?id=' + article._id + '">';
                        html += '  <img class="article-card-image" src="' + imageUrl + '" alt="' + article.title + '" onerror="this.src=\'https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=900&q=80\'">';
                        html += '  <div class="article-card-body">';
                        html += '    <span class="article-card-category ' + getCategoryClass(article.category) + '">' + getCategoryEmoji(article.category) + ' ' + article.category + '</span>';
                        html += '    <h3 class="article-card-title">' + article.title + '</h3>';
                        html += '    <p class="article-card-summary">' + (article.summary || article.content.substring(0, 150) + '...') + '</p>';
                        html += '    <div class="article-card-meta">';
                        html += '      <span>' + formatDate(article.createdAt) + '</span>';
                        html += '      <span class="read-more">Read more →</span>';
                        html += '    </div>';
                        html += '  </div>';
                        html += '</a>';
                    });

                    html += '</div>';
                    container.innerHTML = html;
                })
                .catch(function(error) {
                    console.error('Error loading articles:', error);
                    container.innerHTML = '<div class="no-articles"><h3>Could not load articles</h3><p>Please make sure the server is running and the database is seeded.</p></div>';
                });
        }

        // Filter articles by category
        function filterArticles(category) {
            currentCategory = category;

            // Update active button
            var buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(function(btn) {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase().includes(category) || (category === 'all' && btn.textContent.includes('All'))) {
                    btn.classList.add('active');
                }
            });

            loadArticles(category);

            // Scroll to articles
            document.getElementById('articles').scrollIntoView({ behavior: 'smooth' });
        }

        // Load all articles on page load
        loadArticles('all');
    </script>
</body>
</html>
